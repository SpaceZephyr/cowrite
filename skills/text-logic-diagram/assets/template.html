<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本逻辑关系图</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== 主题变量 ===== */
    :root,
    [data-theme="dark"] {
      --bg-page: #0a0a0a;
      --bg-card: #141414;
      --bg-card-border: #222222;
      --bg-label: #1a2332;
      --bg-node: #1a2332;
      --bg-node-end: #243447;
      --node-stroke: #3f72af;
      --node-stroke-accent: #5dade2;
      --text-primary: #ffffff;
      --text-secondary: #8899aa;
      --text-tag: #5dade2;
      --line-stroke: #556677;
      --arrow-fill: #8899aa;
      --shadow-color: rgba(0,0,0,0.4);
      --tag-bg: rgba(63, 114, 175, 0.15);
      --tag-border: rgba(63, 114, 175, 0.3);
      --toggle-bg: rgba(20, 20, 20, 0.9);
      --toggle-border: #333;
      --toggle-icon: #8899aa;
      --overview-bg: rgba(63, 114, 175, 0.08);
      --overview-border: rgba(63, 114, 175, 0.2);
    }
    [data-theme="light"] {
      --bg-page: #f5f7fa;
      --bg-card: #ffffff;
      --bg-card-border: #dde3ea;
      --bg-label: #eef2f7;
      --bg-node: #e8edf2;
      --bg-node-end: #dbe2ef;
      --node-stroke: #3f72af;
      --node-stroke-accent: #112d4e;
      --text-primary: #112d4e;
      --text-secondary: #4a6785;
      --text-tag: #3f72af;
      --line-stroke: #aabbcc;
      --arrow-fill: #8899aa;
      --shadow-color: rgba(0,0,0,0.08);
      --tag-bg: rgba(63, 114, 175, 0.1);
      --tag-border: rgba(63, 114, 175, 0.25);
      --toggle-bg: rgba(255,255,255,0.9);
      --toggle-border: #ccd;
      --toggle-icon: #4a6785;
      --overview-bg: rgba(63, 114, 175, 0.06);
      --overview-border: rgba(63, 114, 175, 0.15);
    }

    /* ===== 基础 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-page);
      min-height: 100vh;
      padding: 2rem;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 960px; margin: 0 auto; }

    /* ===== 页眉 ===== */
    .header {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-left { flex: 1; }
    .header-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .header-dot { width: 10px; height: 10px; background: #3f72af; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
    .subtitle { color: var(--text-secondary); font-size: 0.8rem; margin-left: 1.6rem; }

    /* ===== 主题切换 ===== */
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 0.5rem;
      background: var(--toggle-bg); border: 1px solid var(--toggle-border);
      cursor: pointer; transition: all 0.3s; flex-shrink: 0; margin-left: 1rem;
    }
    .theme-toggle:hover { border-color: #3f72af; transform: scale(1.05); }
    .theme-toggle svg { width: 18px; height: 18px; fill: var(--toggle-icon); }
    .theme-toggle .icon-moon { display: none; }
    .theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: block; }

    /* ===== 概览卡片 ===== */
    .overview {
      background: var(--overview-bg);
      border: 1px solid var(--overview-border);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }
    .overview-item { display: flex; align-items: center; gap: 0.5rem; }
    .overview-dot { width: 8px; height: 8px; border-radius: 50%; }
    .overview-dot.blue { background: #3f72af; }
    .overview-dot.cyan { background: #5dade2; }
    .overview-dot.teal { background: #1abc9c; }
    .overview-label { color: var(--text-secondary); }

    /* ===== 图表卡片 ===== */
    .diagram-card {
      background: var(--bg-card);
      border: 1px solid var(--bg-card-border);
      border-radius: 0.75rem;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .diagram-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--bg-card-border);
    }
    .label-tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--text-tag);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 0.3rem;
      white-space: nowrap;
    }
    .label-title {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    .diagram-body {
      padding: 1rem;
      overflow-x: auto;
    }
    .diagram-body svg {
      width: 100%;
      min-width: 700px;
      display: block;
    }

    /* ===== 页脚 ===== */
    .footer {
      text-align: center;
      margin-top: 1rem;
      color: var(--text-secondary);
      font-size: 0.7rem;
      opacity: 0.6;
    }

    /* ===== SVG 主题适配 ===== */
    [data-theme="dark"] .svg-text-primary { fill: #ffffff; }
    [data-theme="dark"] .svg-text-secondary { fill: #8899aa; }
    [data-theme="dark"] .svg-mask-bg { fill: #141414; }
    [data-theme="dark"] .svg-line { stroke: #556677; }
    [data-theme="dark"] .svg-arrow { fill: #8899aa; }
    [data-theme="dark"] .svg-node { fill: #1a2332; }
    [data-theme="dark"] .svg-node-accent { fill: #243447; }
    [data-theme="dark"] .svg-badge-bg { fill: #3f72af; }
    [data-theme="dark"] .svg-badge-bg-accent { fill: #5dade2; }
    [data-theme="dark"] .svg-badge-text { fill: #ffffff; }

    [data-theme="light"] .svg-text-primary { fill: #112d4e; }
    [data-theme="light"] .svg-text-secondary { fill: #4a6785; }
    [data-theme="light"] .svg-mask-bg { fill: #ffffff; }
    [data-theme="light"] .svg-line { stroke: #aabbcc; }
    [data-theme="light"] .svg-arrow { fill: #8899aa; }
    [data-theme="light"] .svg-node { fill: #e8edf2; }
    [data-theme="light"] .svg-node-accent { fill: #dbe2ef; }
    [data-theme="light"] .svg-badge-bg { fill: #3f72af; }
    [data-theme="light"] .svg-badge-bg-accent { fill: #112d4e; }
    [data-theme="light"] .svg-badge-text { fill: #ffffff; }
  </style>
</head>
<body data-theme="dark">
  <div class="container">
    <!-- 页眉 -->
    <div class="header">
      <div class="header-left">
        <div class="header-row">
          <div class="header-dot"></div>
          <h1>文本逻辑关系图</h1>
        </div>
        <p class="subtitle">【源文本简述：对输入文本的简要概括】</p>
      </div>
      <div class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 3a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm9-6a1 1 0 0 1-1 1h-1a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1zM5 12a1 1 0 0 1-1 1H3a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1zm14.07-6.36a1 1 0 0 1 0 1.41l-.7.71a1 1 0 0 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zM7.05 17.66a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.42l.7-.71a1 1 0 0 1 1.42 0zm12.02 0a1 1 0 0 1-1.41 0l-.71-.7a1 1 0 0 1 1.42-1.42l.7.71a1 1 0 0 1 0 1.41zM7.05 6.34a1 1 0 0 1-1.41 0l-.71-.7a1 1 0 0 1 1.42-1.42l.7.71a1 1 0 0 1 0 1.41zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0-2a6 6 0 1 1 0 12 6 6 0 0 1 0-12z"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12.1 22c-5.5 0-10-4.5-10-10 0-4.8 3.4-8.8 8.1-9.8.4-.1.8.1 1 .5.2.4.1.8-.3 1.1-1.6 1.2-2.5 3.1-2.5 5.2 0 3.6 2.9 6.5 6.5 6.5 1.5 0 2.9-.5 4-1.4.3-.3.7-.3 1.1-.1.3.2.5.6.4 1-1.1 4.7-5.1 8-9.8 8h-.5z"/></svg>
      </div>
    </div>

    <!-- 概览 -->
    <div class="overview">
      <div class="overview-item">
        <div class="overview-dot blue"></div>
        <span class="overview-label">检测到 N 个逻辑段落</span>
      </div>
      <div class="overview-item">
        <div class="overview-dot cyan"></div>
        <span class="overview-label">识别 M 个核心概念</span>
      </div>
      <div class="overview-item">
        <div class="overview-dot teal"></div>
        <span class="overview-label">关系类型：递进 / 流程 / 循环 / 层次 / 对比 / 矩阵</span>
      </div>
    </div>

    <!-- ============================================================
         图 1：递进关系示例
         ============================================================ -->
    <div class="diagram-card">
      <div class="diagram-label">
        <span class="label-tag">递进关系</span>
        <span class="label-title">第一段：概念渐进发展</span>
      </div>
      <div class="diagram-body">
        <svg class="diagram-svg" viewBox="0 0 800 400">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" class="svg-arrow"/>
            </marker>
            <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
              <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.3"/>
            </filter>
          </defs>

          <!-- 连接线（先绘制，在节点下方） -->
          <line x1="210" y1="180" x2="268" y2="180" class="svg-line" stroke-width="1" marker-end="url(#arrow)"/>
          <text x="239" y="172" class="svg-text-secondary" font-size="10" text-anchor="middle">深化</text>
          <line x1="410" y1="180" x2="468" y2="180" class="svg-line" stroke-width="1" marker-end="url(#arrow)"/>
          <text x="439" y="172" class="svg-text-secondary" font-size="10" text-anchor="middle">扩展</text>
          <line x1="610" y1="180" x2="668" y2="180" class="svg-line" stroke-width="1" marker-end="url(#arrow)"/>
          <text x="639" y="172" class="svg-text-secondary" font-size="10" text-anchor="middle">升华</text>

          <!-- 节点 1 -->
          <rect x="60" y="140" width="150" height="80" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="135" y="172" class="svg-text-primary" font-size="14" font-weight="600" text-anchor="middle">基础认知</text>
          <text x="135" y="195" class="svg-text-secondary" font-size="11" text-anchor="middle">现象观察</text>
          <circle cx="72" cy="152" r="10" class="svg-badge-bg" opacity="0.8"/>
          <text x="72" y="156" class="svg-badge-text" font-size="10" font-weight="700" text-anchor="middle">1</text>

          <!-- 节点 2 -->
          <rect x="270" y="120" width="140" height="100" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="340" y="160" class="svg-text-primary" font-size="14" font-weight="600" text-anchor="middle">深入理解</text>
          <text x="340" y="183" class="svg-text-secondary" font-size="11" text-anchor="middle">原理分析</text>
          <circle cx="282" cy="132" r="10" class="svg-badge-bg" opacity="0.8"/>
          <text x="282" y="136" class="svg-badge-text" font-size="10" font-weight="700" text-anchor="middle">2</text>

          <!-- 节点 3 -->
          <rect x="470" y="100" width="140" height="120" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="540" y="148" class="svg-text-primary" font-size="14" font-weight="600" text-anchor="middle">系统构建</text>
          <text x="540" y="171" class="svg-text-secondary" font-size="11" text-anchor="middle">框架搭建</text>
          <circle cx="482" cy="112" r="10" class="svg-badge-bg" opacity="0.8"/>
          <text x="482" y="116" class="svg-badge-text" font-size="10" font-weight="700" text-anchor="middle">3</text>

          <!-- 节点 4 -->
          <rect x="670" y="80" width="100" height="140" rx="8" class="svg-node-accent" stroke="#5dade2" stroke-width="2" filter="url(#shadow)"/>
          <text x="720" y="140" class="svg-text-primary" font-size="14" font-weight="600" text-anchor="middle">创新</text>
          <text x="720" y="163" class="svg-text-secondary" font-size="11" text-anchor="middle">突破边界</text>
          <circle cx="682" cy="92" r="10" class="svg-badge-bg-accent" opacity="0.9"/>
          <text x="682" y="96" class="svg-badge-text" font-size="10" font-weight="700" text-anchor="middle">4</text>

          <!-- 底部标注 -->
          <text x="400" y="370" class="svg-text-secondary" font-size="10" text-anchor="middle" opacity="0.5">逻辑递进：从基础认知到创新突破的渐进发展过程</text>
        </svg>
      </div>
    </div>

    <!-- ============================================================
         图 2：流程关系示例
         ============================================================ -->
    <div class="diagram-card">
      <div class="diagram-label">
        <span class="label-tag">流程关系</span>
        <span class="label-title">第二段：步骤与阶段</span>
      </div>
      <div class="diagram-body">
        <svg class="diagram-svg" viewBox="0 0 800 350">
          <defs>
            <marker id="arrow2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" class="svg-arrow"/>
            </marker>
          </defs>

          <!-- 连接线 -->
          <line x1="195" y1="80" x2="253" y2="80" class="svg-line" stroke-width="1" marker-end="url(#arrow2)"/>
          <line x1="405" y1="80" x2="463" y2="80" class="svg-line" stroke-width="1" marker-end="url(#arrow2)"/>
          <path d="M 615 80 L 660 80 Q 680 80 680 100 L 680 200 Q 680 220 660 220 L 615 220" class="svg-line" stroke-width="1" fill="none" marker-end="url(#arrow2)"/>
          <line x1="405" y1="220" x2="347" y2="220" class="svg-line" stroke-width="1" marker-end="url(#arrow2)"/>

          <!-- 第一行：步骤 1-3 -->
          <rect x="45" y="45" width="150" height="70" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <circle cx="60" cy="60" r="11" class="svg-badge-bg"/>
          <text x="60" y="64" class="svg-badge-text" font-size="11" font-weight="700" text-anchor="middle">1</text>
          <text x="120" y="78" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">需求分析</text>
          <text x="120" y="98" class="svg-text-secondary" font-size="10" text-anchor="middle">收集与梳理</text>

          <rect x="255" y="45" width="150" height="70" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <circle cx="270" cy="60" r="11" class="svg-badge-bg"/>
          <text x="270" y="64" class="svg-badge-text" font-size="11" font-weight="700" text-anchor="middle">2</text>
          <text x="330" y="78" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">方案设计</text>
          <text x="330" y="98" class="svg-text-secondary" font-size="10" text-anchor="middle">架构规划</text>

          <rect x="465" y="45" width="150" height="70" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <circle cx="480" cy="60" r="11" class="svg-badge-bg"/>
          <text x="480" y="64" class="svg-badge-text" font-size="11" font-weight="700" text-anchor="middle">3</text>
          <text x="540" y="78" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">开发实现</text>
          <text x="540" y="98" class="svg-text-secondary" font-size="10" text-anchor="middle">编码与集成</text>

          <!-- 第二行：步骤 4-5（反向蛇形） -->
          <rect x="465" y="185" width="150" height="70" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <circle cx="480" cy="200" r="11" class="svg-badge-bg"/>
          <text x="480" y="204" class="svg-badge-text" font-size="11" font-weight="700" text-anchor="middle">4</text>
          <text x="540" y="218" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">测试验证</text>
          <text x="540" y="238" class="svg-text-secondary" font-size="10" text-anchor="middle">质量保障</text>

          <rect x="255" y="185" width="150" height="70" rx="8" class="svg-node-accent" stroke="#5dade2" stroke-width="2" filter="url(#shadow)"/>
          <circle cx="270" cy="200" r="11" class="svg-badge-bg-accent"/>
          <text x="270" y="204" class="svg-badge-text" font-size="11" font-weight="700" text-anchor="middle">5</text>
          <text x="330" y="218" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">上线发布</text>
          <text x="330" y="238" class="svg-text-secondary" font-size="10" text-anchor="middle">部署运维</text>

          <text x="400" y="320" class="svg-text-secondary" font-size="10" text-anchor="middle" opacity="0.5">流程关系：从需求到上线的标准交付流程</text>
        </svg>
      </div>
    </div>

    <!-- ============================================================
         图 3：层次结构示例
         ============================================================ -->
    <div class="diagram-card">
      <div class="diagram-label">
        <span class="label-tag">层次结构</span>
        <span class="label-title">第三段：概念包含与从属</span>
      </div>
      <div class="diagram-body">
        <svg class="diagram-svg" viewBox="0 0 800 400">
          <defs>
            <marker id="arrow3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" class="svg-arrow"/>
            </marker>
          </defs>

          <!-- 根节点到子节点的连接线 -->
          <line x1="400" y1="90" x2="200" y2="158" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>
          <line x1="400" y1="90" x2="400" y2="158" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>
          <line x1="400" y1="90" x2="600" y2="158" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>

          <!-- 子节点到孙节点的连接线 -->
          <line x1="200" y1="230" x2="130" y2="298" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>
          <line x1="200" y1="230" x2="270" y2="298" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>
          <line x1="600" y1="230" x2="530" y2="298" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>
          <line x1="600" y1="230" x2="670" y2="298" class="svg-line" stroke-width="1" marker-end="url(#arrow3)"/>

          <!-- 根节点 -->
          <rect x="310" y="40" width="180" height="60" rx="8" class="svg-node" stroke="#3f72af" stroke-width="2" filter="url(#shadow)"/>
          <text x="400" y="75" class="svg-text-primary" font-size="15" font-weight="700" text-anchor="middle">核心主题</text>

          <!-- 第二层 -->
          <rect x="120" y="160" width="160" height="60" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="200" y="195" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">子主题 A</text>

          <rect x="320" y="160" width="160" height="60" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="400" y="195" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">子主题 B</text>

          <rect x="520" y="160" width="160" height="60" rx="8" class="svg-node" stroke="#3f72af" stroke-width="1.5" filter="url(#shadow)"/>
          <text x="600" y="195" class="svg-text-primary" font-size="13" font-weight="600" text-anchor="middle">子主题 C</text>

          <!-- 第三层 -->
          <rect x="55" y="300" width="150" height="50" rx="6" class="svg-node" stroke="#3f72af" stroke-width="1" filter="url(#shadow)"/>

      b.setAttribute('data-theme', n);
      try { localStorage.setItem('logic-diagram-theme', n); } catch(e) {}
    }
